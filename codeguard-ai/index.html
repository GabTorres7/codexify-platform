<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Codefy — Analisador inteligente de Merge Requests com IA">
    <title>Codefy — Analisador de Merge Requests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
                            <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="url(#logoGrad2)" opacity="0.8"/>
                            <circle cx="14" cy="14" r="3" fill="white" opacity="0.9"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="2" y1="2" x2="26" y2="26">
                                    <stop stop-color="#818cf8"/><stop offset="1" stop-color="#06b6d4"/>
                                </linearGradient>
                                <linearGradient id="logoGrad2" x1="8" y1="8" x2="20" y2="20">
                                    <stop stop-color="#a78bfa"/><stop offset="1" stop-color="#22d3ee"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <span class="logo-name">Codefy</span>
                        <span class="logo-badge">AI</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">Principal</div>
                <a href="#" class="nav-item active" data-page="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="merge-requests">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg>
                    <span>Merge Requests</span>
                </a>

                <div class="nav-section-label">Gerenciamento</div>
                <a href="#" class="nav-item" data-page="repositories">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span>Repositorios</span>
                </a>
                <a href="#" class="nav-item" data-page="team">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Equipe</span>
                </a>

                <div class="nav-section-label">Configuracao</div>
                <a href="#" class="nav-item" data-page="rules">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span>Regras</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <span>Configuracoes</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="ai-status">
                    <div class="ai-pulse"></div>
                    <span>IA Ativa</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div class="search-bar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Buscar merge requests, branches..." id="searchInput">
                    </div>
                </div>
                <div class="header-right">
                    <button class="header-btn notification-btn" id="notifBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="notif-badge">3</span>
                    </button>
                    <div class="user-avatar" id="userAvatar"><span>ST</span></div>
                </div>
            </header>
            <div class="page-content" id="pageContent"></div>
        </main>
    </div>

    <!-- MR Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="mrDetailModal">
            <div class="modal-header">
                <div class="modal-title-area">
                    <h2 id="modalTitle">Merge Request</h2>
                    <span class="modal-subtitle" id="modalSubtitle"></span>
                </div>
                <button class="modal-close" id="modalClose">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="overview">Visao Geral</button>
                <button class="modal-tab" data-tab="analysis">Analise IA</button>
                <button class="modal-tab" data-tab="diff">Diff</button>
                <button class="modal-tab" data-tab="rules">Regras</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Action Modal -->
    <div class="modal-overlay" id="actionModalOverlay">
        <div class="modal" id="actionModal" style="max-width:580px">
            <div class="modal-header">
                <div class="modal-title-area"><h2 id="actionModalTitle">Acao</h2></div>
                <button class="modal-close" id="actionModalClose">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="actionModalBody"></div>
        </div>
    </div>

    <script src="data.js?v=2"></script>
    <script src="engine.js?v=2"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
